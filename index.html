<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Normalize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <title>bravo project</title>
</head>

<body>
  
  <div id="game" class="container">
    <div class="row">
      <div class="col-md-10 offset-md-1">
        <h1>Welcome to my web game</h1>
        <label for="playerName">Enter your name:</label>
        <input id="playerName">

        <p id="greetPlayer"></p>
        <p>Lines of Code: <span id="lineCount">0</span></p>
      </div>
  </div>

  <div class="container py-4">
    <div class="row">
      <div class="col bg-light p-3 border">
        <button type="button" id="bigButton">Click Me</button>
      </div>
      <div class="col bg-secondary text-white p-3 border">
        <button type="button" id="upgrade-one" class="btn btn-primary upgradeButton">Upgrade 1: 100</button><br>
        <button type="button" id="upgrade-two" class="btn btn-primary upgradeButton">Upgrade 2: 300</button><br>
        <button type="button" id="upgrade-three" class="btn btn-primary upgradeButton">Upgrade 3: 500</button>
        <button type="button" id="automation-one" class="btn btn-primary upgradeButton">Automation 1: 100</button>
      </div>
    </div>
  </div>


  


  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

  <!-- jQuery UI -->
  <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js" integrity="sha256-mblSWfbYzaq/f+4akyMhE6XELCou4jbkgPv+JQPER2M=" crossorigin="anonymous"></script>

  <!-- Custom JS -->
  <script src="assets/js/main.js"></script>
</body>

</html>
